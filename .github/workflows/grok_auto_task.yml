name: AI吃瓜日报自动发布

on:

  workflow_dispatch:

jobs:
  run-grok:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write    # 允许提交 bb_state.json 回仓库

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install browserbase playwright requests
          playwright install chromium --with-deps

      - name: Run grok_auto_task
        env:
          BROWSERBASE_API_KEY:      ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID:   ${{ secrets.BROWSERBASE_PROJECT_ID }}
          BROWSERBASE_CONTEXT_ID:   ${{ secrets.BROWSERBASE_CONTEXT_ID }}
          BROWSERBASE_API_KEY_2:    ${{ secrets.BROWSERBASE_API_KEY_2 }}
          BROWSERBASE_PROJECT_ID_2: ${{ secrets.BROWSERBASE_PROJECT_ID_2 }}
          BROWSERBASE_CONTEXT_ID_2: ${{ secrets.BROWSERBASE_CONTEXT_ID_2 }}
          BROWSERBASE_API_KEY_3:    ${{ secrets.BROWSERBASE_API_KEY_3 }}
          BROWSERBASE_PROJECT_ID_3: ${{ secrets.BROWSERBASE_PROJECT_ID_3 }}
          BROWSERBASE_CONTEXT_ID_3: ${{ secrets.BROWSERBASE_CONTEXT_ID_3 }}
          JIJYUN_WEBHOOK_URL:       ${{ secrets.JIJYUN_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL:       ${{ secrets.FEISHU_WEBHOOK_URL }}
          SF_API_KEY:               ${{ secrets.SF_API_KEY }}
          IMGBB_API_KEY:            ${{ secrets.IMGBB_API_KEY }}
        run: python grok_auto_task.py

      # 无论成败，把账号状态文件提交回仓库（记录冷却信息）
      - name: Save account state
        if: always()
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bb_state.json || true
          git diff --cached --quiet || git commit -m "chore: update bb_state [skip ci]"
          git push || true

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ github.run_number }}
          path: |
            *.png
            *.jpg
          retention-days: 7
          if-no-files-found: ignore
