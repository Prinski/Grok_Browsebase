name: Grok每日AI吃瓜日报

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run-grok-auto-task:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install browserbase playwright requests
          playwright install chromium --with-deps

      - name: 运行 Grok 主任务
        env:
          BROWSERBASE_API_KEY:    ${{ secrets.BROWSERBASE_API_KEY }}
          BROWSERBASE_PROJECT_ID: ${{ secrets.BROWSERBASE_PROJECT_ID }}
          BROWSERBASE_CONTEXT_ID: ${{ secrets.BROWSERBASE_CONTEXT_ID }}
          JIJYUN_WEBHOOK_URL:     ${{ secrets.JIJYUN_WEBHOOK_URL }}
          FEISHU_WEBHOOK_URL:     ${{ secrets.FEISHU_WEBHOOK_URL }}
          XAI_API_KEY:            ${{ secrets.XAI_API_KEY }}
        run: python grok_auto_task.py

      - name: 上传调试截图与封面图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-artifacts
          path: |
            00_opened.png
            01_model_menu.png
            02_model_confirmed.png
            03_stage_a_before.png
            03_stage_a_done.png
            03_stage_a_timeout.png
            04_stage_b_before.png
            04_stage_b_done.png
            04_stage_b_timeout.png
            05_stage_c_before.png
            05_stage_c_done.png
            cover.png
          if-no-files-found: ignore
